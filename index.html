<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FBF8F2">
<title>にゅうた動物病院 ポータル</title>
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --green:#6fb82b;
  --green-dark:#4f8a1c;
  --green-soft:#eaf6dd;
  --brown:#6b4834;
  --brown-soft:#8a6650;
  --cream:#FBF8F2;
  --card:#FFFFFF;
  --line:#EAE3D6;
  --text-main:#3A332C;
  --text-sub:#8C8276;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,sans-serif;
  background:var(--cream);
  color:var(--text-main);
  overflow-x:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
.app{
  max-width:980px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== Header ===== */
.header{
  text-align:center;
  padding:30px 24px 22px;
  position:relative;
}
.logo-ring{
  width:104px;
  height:104px;
  margin:0 auto 12px;
  border-radius:50%;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 20px rgba(111,184,43,0.18);
  border:3px solid var(--green-soft);
  overflow:hidden;
}
.logo-ring img{
  width:96%;
  height:96%;
  object-fit:contain;
}
.hospital-name{
  font-size:20px;
  font-weight:800;
  color:var(--brown);
  letter-spacing:0.02em;
}
.portal-label{
  font-size:11.5px;
  font-weight:700;
  color:var(--green-dark);
  letter-spacing:0.16em;
  margin-top:4px;
  text-transform:uppercase;
}

/* ===== Tool grid: 3 columns, tuned for landscape iPad ===== */
.tool-list{
  flex:1;
  padding:6px 24px 40px;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:16px;
}

.tool-card{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--card);
  border-radius:18px;
  padding:14px 16px;
  text-decoration:none;
  color:inherit;
  position:relative;
  border:1.5px solid var(--line);
  box-shadow:0 2px 10px rgba(107,72,52,0.05);
  transition:transform .15s ease, box-shadow .15s ease;
  overflow:hidden;
}
.tool-card::before{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:6px;
  background:var(--accent, var(--green));
  border-radius:6px 0 0 6px;
}
.tool-card:active{
  transform:scale(0.97);
}

.tool-icon{
  width:44px;
  height:44px;
  border-radius:14px;
  background:var(--accent-soft, var(--green-soft));
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.tool-icon svg{
  width:22px;
  height:22px;
}

.tool-name{
  font-size:14px;
  font-weight:800;
  color:var(--text-main);
  line-height:1.3;
  min-width:0;
}

/* empty state for future tools hint */
.add-hint{
  grid-column:1 / -1;
  text-align:center;
  padding:18px 0 6px;
  font-size:11.5px;
  color:var(--text-sub);
}

/* footer */
.footer{
  text-align:center;
  padding:18px 24px calc(22px + env(safe-area-inset-bottom));
  font-size:10.5px;
  color:var(--text-sub);
  line-height:1.6;
}
.footer .leaf{color:var(--green);}

/* decorative leaf divider */
.leaf-divider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin:4px 0 18px;
  opacity:0.55;
}
.leaf-divider span{
  width:5px;height:5px;
  border-radius:50%;
  background:var(--green);
}
.leaf-divider span:nth-child(2){background:var(--brown-soft);}

/* On narrower/portrait screens, fall back to 2 columns so cards don't get
   too cramped (iPad portrait, or a phone). */
@media (max-width: 620px){
  .tool-list{ grid-template-columns:repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-ring">
      <img src="icon-512.png" alt="にゅうた動物病院">
    </div>
    <div class="hospital-name">にゅうた動物病院</div>
    <div class="portal-label">Tools Portal</div>
  </div>

  <div class="leaf-divider"><span></span><span></span><span></span></div>

  <div class="tool-list" id="toolList"></div>

  <div class="footer">
    <span class="leaf">🌿</span> 院内専用ツール集 ｜ 各ツールは個別のページで開きます
  </div>
</div>

<script src="tools-config.js"></script>
<script>
const ICONS = {
  syringe: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"><path d="M18 2l4 4"/><path d="M17 7l-1.5-1.5"/><path d="M3 21l3-3"/><path d="M14.5 4.5L20 10l-9 9-8-8 9-9z"/><path d="M9.5 9.5l1 1"/><path d="M12 7l1 1"/><path d="M7 12l1 1"/></svg>`,
  yen: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"><path d="M12 4v16M6 4l6 9 6-9M5 12h14M5 15h14"/></svg>`,
  paw: `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="6" cy="9" r="2.2"/><circle cx="11" cy="6" r="2.2"/><circle cx="16" cy="9" r="2.2"/><path d="M11 11c-3.5 0-6.5 2.6-6.5 5.6 0 1.9 1.6 3.4 3.5 3.4 1.1 0 1.7-.5 3-.5s1.9.5 3 .5c1.9 0 3.5-1.5 3.5-3.4C17.5 13.6 14.5 11 11 11z"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 3v4"/><path d="M16 3v4"/><circle cx="8" cy="14" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="1.4" fill="currentColor" stroke="none"/><circle cx="16" cy="14" r="1.4" fill="currentColor" stroke="none"/></svg>`
};

function renderTools(){
  const list = document.getElementById("toolList");
  list.innerHTML = "";

  TOOLS.forEach(tool => {
    const card = document.createElement("a");
    card.className = "tool-card";
    card.href = tool.url;
    card.target = "_blank";
    card.rel = "noopener";
    card.style.setProperty("--accent", tool.color);
    card.style.setProperty("--accent-soft", tool.color + "1A");

    const iconSvg = ICONS[tool.icon] || ICONS.paw;

    card.innerHTML = `
      <div class="tool-icon" style="color:${tool.color}">${iconSvg}</div>
      <div class="tool-name">${tool.name}</div>`;

    list.appendChild(card);
  });

  if(TOOLS.length === 0){
    list.innerHTML = `<div class="add-hint">ツールはまだ登録されていません</div>`;
  }
}

renderTools();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
